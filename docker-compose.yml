version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: coaniquem-postgres
    environment:
      POSTGRES_USER: coaniquem
      POSTGRES_PASSWORD: coaniquem_dev
      POSTGRES_DB: coaniquem_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: coaniquem-redis
    ports:
      - '6379:6379'

volumes:
  pgdata:
